name: CICD

on:
  workflow_dispatch: 

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloning the code"
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building using docker"
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Running test cases
        run: echo "Testing the app"
        
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying on machine
        run: echo "Deploying"
