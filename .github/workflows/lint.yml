#Goal of the workflow : whenever someone changes the python code, the linter will check the syntax, format, indentation (Linting is correct or not)

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code :
    runs-on: ubuntu-latest
    steps:
      # this step will automatically clone the code of the current branch (main branch) into the runner
      - name: Checkout/clone the code
        uses: actions/checkout@v7
        #@v7 is the version

        # this step will install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

         # this step will install the linting tool 
      - name: Install Linter
        run: pip install ruff

         # this step will run the linter
      - name: Check the files for linting
        run: ruff check .
      
        
